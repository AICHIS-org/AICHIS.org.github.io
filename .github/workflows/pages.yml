# Deploys the site to GitHub Pages automatically on every push to main.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stamp asset URLs with the commit hash so browsers always load the
      # newest CSS/JS after a deploy instead of a cached copy.
      - name: Cache-bust assets
        run: sed -i "s/__BUILD__/${GITHUB_SHA::7}/g" index.html

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # the whole repo root is the site (no build step)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
