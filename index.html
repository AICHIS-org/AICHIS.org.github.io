<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AICHIS</title>
  <meta name="description" content="AICHIS — Asociación de Investigadores Chilenos en Suecia / Association of Chilean Researchers in Sweden" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/img/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
</head>
<body>
  <!-- ===================== HEADER / NAV ===================== -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#top" aria-label="AICHIS — home">
        <img class="brand-logo" src="assets/img/logo.png" alt="AICHIS" />
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="#about" data-i18n="nav.about"></a></li>
          <li><a href="#members" data-i18n="nav.members"></a></li>
          <li><a href="#researchers" data-i18n="nav.researchers"></a></li>
          <li><a href="#resources" data-i18n="nav.resources"></a></li>
        </ul>
      </nav>

      <div class="lang-switch" role="group" aria-label="Language selector">
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="sv">SV</button>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- ===================== HERO ===================== -->
    <section class="hero">
      <div class="container hero-inner">
        <h1 class="hero-title" aria-label="AICHIS">
          <span class="l l-white">A</span><span class="l l-white">I</span><span class="l l-blue">C</span><span class="l l-red">H</span><span class="l l-white">I</span><span class="l l-yellow">S</span>
        </h1>
        <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
        <a class="btn btn-primary" href="#about" data-i18n="hero.cta"></a>
      </div>
    </section>

    <!-- ===================== ABOUT ===================== -->
    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="about.title"></h2>
        <p class="section-lead" data-i18n="about.lead"></p>
        <div class="cards" id="about-cards"><!-- populated from content.js --></div>
      </div>
    </section>

    <!-- ===================== MEMBERS ===================== -->
    <section id="members" class="section section-alt">
      <div class="container">
        <h2 class="section-title" data-i18n="members.title"></h2>
        <p class="section-lead" data-i18n="members.lead"></p>
        <div class="members-grid" id="members-grid"><!-- populated from content.js --></div>
      </div>
    </section>

    <!-- ================= CHILEANS IN SWEDEN ================= -->
    <section id="researchers" class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="researchers.title"></h2>
        <p class="section-lead" data-i18n="researchers.lead"></p>
        <div class="researchers-grid" id="researchers-grid"><!-- populated from content.js --></div>
        <div class="section-cta">
          <a class="btn btn-outline" href="https://github.com/AICHIS-org/AICHIS.org.github.io/issues/new/choose" target="_blank" rel="noopener" data-i18n="researchers.cta"></a>
        </div>
      </div>
    </section>

    <!-- ===================== RESOURCES ===================== -->
    <section id="resources" class="section section-alt">
      <div class="container">
        <h2 class="section-title" data-i18n="resources.title"></h2>
        <p class="section-lead" data-i18n="resources.lead"></p>
        <div class="resources-list" id="resources-list"><!-- populated from content.js --></div>
      </div>
    </section>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-brand">
        <img class="footer-logo" src="assets/img/logo-white.png" alt="AICHIS" />
        <p data-i18n="footer.tagline"></p>

        <ul class="social" aria-label="AICHIS on social media">
          <li>
            <a href="https://www.youtube.com/@Aichis_2022" target="_blank" rel="noopener" aria-label="YouTube">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
          </li>
          <li>
            <a href="https://x.com/AICHIS_2022" target="_blank" rel="noopener" aria-label="X (Twitter)">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
          </li>
          <li>
            <a href="https://www.linkedin.com/in/association-of-chilean-researchers-in-sweden-aichis/" target="_blank" rel="noopener" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
            </a>
          </li>
        </ul>

        <p class="footer-meta">&copy; <span id="year"></span> AICHIS</p>
      </div>

      <div class="footer-contribute">
        <h3 data-i18n="footer.contributeTitle"></h3>
        <p data-i18n="footer.contributeText"></p>
        <div class="footer-actions">
          <a class="footer-link primary" href="https://github.com/AICHIS-org/AICHIS.org.github.io/issues/new/choose" target="_blank" rel="noopener">
            <span data-i18n="footer.reportIssue"></span>
          </a>
          <a class="footer-link secondary" href="https://github.com/AICHIS-org/AICHIS.org.github.io" target="_blank" rel="noopener">
            <span data-i18n="footer.proposeChange"></span>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="assets/js/content.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
